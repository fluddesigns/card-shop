<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flud Media TCG{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        const storedTheme = localStorage.getItem('tcg-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (storedTheme) {
            document.documentElement.setAttribute('data-bs-theme', storedTheme);
        } else if (prefersDark) {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-bs-theme', 'light');
        }
    </script>

    <style>
        /* Custom Brand Adjustments */
        .brand-text { color: #9200d6; font-weight: 800; letter-spacing: -0.5px; }
        
        /* Subtle transitions for smooth mode toggling */
        body, .card, .modal-content, .offcanvas { transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Ensure inputs look good in both modes */
        .form-control:focus, .form-select:focus { border-color: #dc3545; box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25); }
    </style>
</head>
<body class="bg-body-tertiary m-0 p-0" style="min-height: 100vh; margin:0; padding:0;">

        
        <nav class="navbar navbar-expand-lg border-bottom shadow-sm bg-body sticky-top top-0 w-100 m-0" style="z-index: 1030;">
            <div class="container-fluid px-lg-5">
                <a class="navbar-brand brand-text" href="{{ url_for('index') }}">FLUD MEDIA</a>
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
                    <div class="offcanvas-header border-bottom">
                        <h5 class="offcanvas-title brand-text">FLUD MEDIA</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                    </div>
                    
                    <div class="offcanvas-body">
                        <ul class="navbar-nav me-auto fw-semibold">
                            <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="{{ url_for('trade_tool') }}">Trade Tool</a></li>
                        </ul>
                        <ul class="navbar-nav ms-auto align-items-center fw-semibold">
                            <li class="nav-item me-2 d-none d-lg-block">
                                <button id="themeToggle" class="btn btn-link nav-link fs-5 text-body">🌓</button>
                            </li>
                            {% if current_user.is_authenticated %}
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin') }}">📦 Inventory</a></li>
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('pokedex_hub') }}">📕 Pokedex</a></li>
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('sales') }}">💰 Sales</a></li>
                                <li class="nav-item"><a class="nav-link text-danger fw-bold ms-lg-3" href="{{ url_for('logout') }}">🚪 Logout</a></li>
                            {% else %}
                                <li class="nav-item"><a class="nav-link" href="{{ url_for('login') }}">Login</a></li>
                            {% endif %}
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow-1">
            {% block content %}{% endblock %}
        </main>

        <footer class="bg-body border-top py-3 text-center text-muted small">
            &copy; Flud Media TCG
        </footer>

</body>```

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('tcg-theme', newTheme);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
